<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Fish Browser v1.1.5 | Bluefin Ultimate</title>
    <style>
        :root { --main-bg: #000b1e; --ui-bg: #001535; --accent: #0088ff; --text: #00d9ff; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--main-bg); font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; }
        #browser-ui { display: flex; flex-direction: column; height: 100%; position: relative; }
        
        #tabs-bar { display: flex; background: var(--ui-bg); padding: 5px 10px; gap: 5px; border-bottom: 2px solid var(--accent); align-items: center; }
        #tabs-container { display: flex; gap: 5px; overflow-x: auto; }
        .tab { background: rgba(255,255,255,0.1); color: #fff; padding: 8px 15px; border-radius: 5px 5px 0 0; cursor: pointer; min-width: 130px; max-width: 170px; font-size: 11px; border: 1px solid var(--accent); display: flex; justify-content: space-between; align-items: center; white-space: nowrap; transition: 0.2s; }
        .tab.active { background: var(--accent); color: #000; font-weight: bold; }
        .tab-title { overflow: hidden; text-overflow: ellipsis; flex-grow: 1; }
        .close-btn { font-weight: bold; margin-left: 10px; padding: 0 4px; border-radius: 3px; }
        .close-btn:hover { background: rgba(0,0,0,0.3); color: white; }

        #nav-bar { display: flex; background: rgba(0,0,0,0.2); padding: 8px 12px; gap: 10px; align-items: center; }
        .nav-btn { background: #333; border: 1px solid #555; color: white; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .nav-btn:hover { background: var(--accent); color: black; }
        input#url-input { flex-grow: 1; background: rgba(0,0,0,0.5); border: 1px solid var(--accent); color: var(--text); padding: 7px 15px; border-radius: 20px; outline: none; font-family: 'Consolas', monospace; }
        
        #content-area { flex-grow: 1; position: relative; background: #000; }
        webview { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
        webview.active { display: flex !important; }

        #side-menu { position: fixed; top: 0; right: -320px; width: 310px; height: 100%; background: var(--ui-bg); z-index: 1000; transition: 0.3s; border-left: 2px solid var(--accent); padding: 20px; box-sizing: border-box; overflow-y: auto; }
        #side-menu.open { right: 0; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 999; }
        .lang-btn { background: #333; color: white; border: 1px solid #444; padding: 4px; margin: 1px; cursor: pointer; font-size: 10px; min-width: 42px; flex: 1; }
        .lang-btn.active { background: var(--accent); color: black; }
    </style>
</head>
<body>

<div id="overlay" onclick="toggleMenu()"></div>

<div id="side-menu">
    <h3 id="txt-settings" style="color: var(--accent);">SETTINGS</h3>
    <p id="location-status" style="font-size: 10px; color: #888;">Detecting...</p>
    
    <p><b id="txt-lang">Language:</b></p>
    <div id="lang-grid" style="display: flex; flex-wrap: wrap; gap: 2px;">
        <button class="lang-btn" onclick="setLanguage('fi')">FI</button>
        <button class="lang-btn" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn" onclick="setLanguage('et')">ET</button>
        <button class="lang-btn" onclick="setLanguage('zh')">ZH</button>
        <button class="lang-btn" onclick="setLanguage('ru')">RU</button>
        <button class="lang-btn" onclick="setLanguage('uk')">UK</button>
        <button class="lang-btn" onclick="setLanguage('de')">DE</button>
        <button class="lang-btn" onclick="setLanguage('es')">ES</button>
        <button class="lang-btn" onclick="setLanguage('ro')">RO</button>
        <button class="lang-btn" onclick="setLanguage('sv')">SV</button>
        <button class="lang-btn" onclick="setLanguage('ja')">JA</button>
    </div>

    <p><b id="txt-themes">Themes:</b></p>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
        <button class="nav-btn" onclick="setTheme('sea')">Sea Blue</button>
        <button class="nav-btn" onclick="setTheme('tronic')">Tronic</button>
        <button class="nav-btn" onclick="setTheme('bw')">B&W</button>
        <button class="nav-btn" onclick="setTheme('grass')">Grass</button>
        <button class="nav-btn" onclick="setTheme('neon')">Neon Red</button>
        <button class="nav-btn" onclick="setTheme('matrix')">Matrix</button>
    </div>

    <p><b id="txt-history">History:</b></p>
    <div id="history-list" style="font-size:10px; background:#000; padding:5px; height:100px; overflow-y:auto; color:#aaa;"></div>

    <button class="nav-btn" style="width:100%; margin-top:10px;" onclick="openDownloads()">Avaa lataukset 📥</button>
    
    <br><button class="nav-btn" style="width:100%" onclick="getCurrentWebview()?.openDevTools()">Inspect Element</button>
</div>

<div id="browser-ui">
    <div id="tabs-bar">
        <div id="tabs-container"></div>
        <button class="nav-btn" onclick="createNewTab()">+</button>
    </div>

    <div id="nav-bar">
        <button class="nav-btn" onclick="getCurrentWebview()?.goBack()">←</button>
        <button class="nav-btn" onclick="getCurrentWebview()?.goForward()">→</button>
        <button class="nav-btn" onclick="getCurrentWebview()?.reload()">↻</button>
        <input type="text" id="url-input" onkeypress="handleUrl(event)">
        <button class="nav-btn" onclick="addCurrentAsBookmark()">⭐</button>
        <div onclick="toggleMenu()" style="cursor:pointer; font-size: 24px; padding: 0 10px; color: var(--accent);">☰</div>
    </div>

    <div id="content-area"></div>
</div>

<script>
let tabCount = 0;
let activeTabId = null;
let historyData = JSON.parse(localStorage.getItem('fisb_history')) || [];

const i18n = {
    fi: { settings: "ASETUKSET", lang: "Kieli", themes: "Teemat", history: "Historia", placeholder: "Hae..." },
    en: { settings: "SETTINGS", lang: "Language", themes: "Themes", history: "History", placeholder: "Search..." },
    et: { settings: "SEADED", lang: "Keel", themes: "Teemad", history: "Ajalugu", placeholder: "Otsi..." },
    zh: { settings: "设置", lang: "语言", themes: "主题", history: "历史", placeholder: "搜索..." },
    ru: { settings: "НАСТРОЙКИ", lang: "Язык", themes: "Темы", history: "История", placeholder: "Поиск..." },
    uk: { settings: "НАЛАШТУВАННЯ", lang: "Мова", themes: "Теми", history: "Історія", placeholder: "Пошук..." },
    de: { settings: "EINSTELLUNGEN", lang: "Sprache", themes: "Themen", history: "Verlauf", placeholder: "Suche..." },
    es: { settings: "AJUSTES", lang: "Idioma", themes: "Temas", history: "Historial", placeholder: "Buscar..." },
    ro: { settings: "SETĂRI", lang: "Limbă", themes: "Teme", history: "Istoric", placeholder: "Caută..." },
    sv: { settings: "INSTÄLLNINGAR", lang: "Språk", themes: "Teman", history: "Historik", placeholder: "Sök..." },
    ja: { settings: "設定", lang: "言語", themes: "テーマ", history: "歴史", placeholder: "検索..." }
};

function createNewTab(url = "https://www.google.com") {
    tabCount++;
    const id = tabCount;
    const tab = document.createElement('div');
    tab.className = 'tab';
    tab.id = `btn-wv-${id}`;
    tab.innerHTML = `<span class="tab-title" id="title-wv-${id}">Ladataan...</span><span class="close-btn" onclick="closeTab(event, ${id})">×</span>`;
    tab.onclick = () => switchTab(id);
    document.getElementById('tabs-container').appendChild(tab);

    const wv = document.createElement('webview');
    wv.id = `wv-${id}`;
    wv.src = url;
    wv.setAttribute('useragent', "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36");
    
    wv.addEventListener('page-title-updated', (e) => {
        const titleEl = document.getElementById(`title-wv-${id}`);
        if(titleEl) titleEl.innerText = e.title.substring(0, 18);
    });

    wv.addEventListener('did-navigate', (e) => {
        if (activeTabId === id) document.getElementById('url-input').value = e.url;
        historyData.push({url: e.url});
        localStorage.setItem('fisb_history', JSON.stringify(historyData.slice(-30)));
    });

    document.getElementById('content-area').appendChild(wv);
    switchTab(id);
}

function switchTab(id) {
    activeTabId = id;
    document.querySelectorAll('webview, .tab').forEach(el => el.classList.remove('active'));
    document.getElementById(`wv-${id}`)?.classList.add('active');
    document.getElementById(`btn-wv-${id}`)?.classList.add('active');
    const wv = document.getElementById(`wv-${id}`);
    if(wv) try { document.getElementById('url-input').value = wv.getURL(); } catch(e) {}
}

function closeTab(e, id) {
    e.stopPropagation();
    document.getElementById(`btn-wv-${id}`)?.remove();
    document.getElementById(`wv-${id}`)?.remove();
    const rem = document.querySelectorAll('.tab');
    if (rem.length > 0) {
        const lastId = rem[rem.length - 1].id.replace('btn-wv-', '');
        switchTab(parseInt(lastId));
    } else {
        createNewTab();
    }
}

function handleUrl(e) {
    if (e.key === 'Enter') {
        let val = e.target.value;
        if (!val.includes('.') && !val.startsWith('http')) {
            val = 'https://www.google.com/search?q=' + encodeURIComponent(val);
        } else if (!val.startsWith('http')) {
            val = 'https://' + val;
        }
        getCurrentWebview().src = val;
    }
}

function getCurrentWebview() { return document.getElementById(`wv-${activeTabId}`); }

function toggleMenu() {
    const menu = document.getElementById('side-menu');
    menu.classList.toggle('open');
    document.getElementById('overlay').style.display = menu.classList.contains('open') ? 'block' : 'none';
    document.getElementById('history-list').innerHTML = historyData.slice(-15).reverse().map(h => `<div style="border-bottom:1px solid #333; padding:2px; font-size:9px; overflow:hidden; white-space:nowrap;">${h.url}</div>`).join('');
}

function setTheme(t) {
    const r = document.querySelector(':root');
    const themes = {
        sea: { bg: '#000b1e', ui: '#001535', acc: '#0088ff', txt: '#00d9ff' },
        tronic: { bg: '#1a0f00', ui: '#2d1a00', acc: '#ff8800', txt: '#ffcc00' },
        bw: { bg: '#000', ui: '#111', acc: '#fff', txt: '#fff' },
        grass: { bg: '#1b2e1b', ui: '#2d4a2d', acc: '#4caf50', txt: '#8bc34a' },
        neon: { bg: '#000', ui: '#111', acc: '#ff4444', txt: '#ff4444' },
        matrix: { bg: '#000', ui: '#000', acc: '#00ff00', txt: '#00ff00' }
    };
    const s = themes[t] || themes.sea;
    r.style.setProperty('--main-bg', s.bg);
    r.style.setProperty('--ui-bg', s.ui);
    r.style.setProperty('--accent', s.acc);
    r.style.setProperty('--text', s.txt);
    localStorage.setItem('fisb_theme', t);
}

function setLanguage(lang) {
    const t = i18n[lang] || i18n.en;
    document.getElementById('txt-settings').innerText = t.settings;
    document.getElementById('txt-lang').innerText = t.lang + ":";
    document.getElementById('txt-themes').innerText = t.themes + ":";
    document.getElementById('txt-history').innerText = t.history + ":";
    document.getElementById('url-input').placeholder = t.placeholder;
    localStorage.setItem('fisb_lang', lang);
}

function addCurrentAsBookmark() { /* Logic simplified for stability */ }

window.onload = () => {
    setTheme(localStorage.getItem('fisb_theme') || 'sea');
    setLanguage(localStorage.getItem('fisb_lang') || 'fi');
    createNewTab();
    fetch('https://ipwho.is/').then(r=>r.json()).then(d=>{
        if(d.city) document.getElementById('location-status').innerText = `Location: ${d.city}, ${d.country_code}`;
    }).catch(()=>{});
};
</script>
</body>
</html>
