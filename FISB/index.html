<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Fish Browser v0.4.0 | Ultimate</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #browser-ui { display: flex; flex-direction: column; height: 100%; }
        
        /* Palkit */
        #tabs-bar { display: flex; background: #111; padding: 5px 5px 0; gap: 5px; border-bottom: 2px solid #ff4444; align-items: flex-end; }
        .tab { background: #222; color: #fff; padding: 8px 15px; border-radius: 5px 5px 0 0; cursor: pointer; min-width: 150px; display: flex; align-items: center; justify-content: space-between; font-size: 11px; border: 1px solid #333; border-bottom: none; }
        .tab.active { background: #ff4444; font-weight: bold; }
        .close-tab { margin-left: 10px; color: #ff9999; cursor: pointer; }
        .add-tab { background: #333; color: white; border: none; padding: 5px 12px; cursor: pointer; border-radius: 5px; margin-bottom: 5px; }

        #nav-bar { display: flex; background: #1a1a1a; padding: 10px; gap: 10px; align-items: center; }
        input#url-input { flex-grow: 1; background: #000; border: 1px solid #444; color: #00ff00; padding: 8px 15px; border-radius: 20px; outline: none; font-family: monospace; }
        .nav-btn { background: none; border: none; color: white; font-size: 18px; cursor: pointer; }

        /* HAMPURILAINEN */
        #menu-btn { font-size: 24px; color: white; cursor: pointer; padding: 0 10px; user-select: none; }
        #side-menu { 
            position: fixed; top: 0; right: -250px; width: 250px; height: 100%; 
            background: #111; color: white; z-index: 1000; transition: 0.3s; 
            border-left: 2px solid #ff4444; box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            padding: 20px; box-sizing: border-box;
        }
        #side-menu.open { right: 0; }
        .menu-item { 
            padding: 12px; border-bottom: 1px solid #333; cursor: pointer; 
            transition: 0.2s; font-size: 14px; 
        }
        .menu-item:hover { background: #ff4444; padding-left: 20px; }
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); display: none; z-index: 999; 
        }

        #content-area { flex-grow: 1; position: relative; background: #222; }
        webview { width: 100%; height: 100%; display: none; background: white; }
        webview.active { display: flex; }
    </style>
</head>
<body>

<div id="overlay" onclick="toggleMenu()"></div>

<div id="side-menu">
    <h3 style="color: #ff4444; border-bottom: 2px solid #ff4444; padding-bottom: 10px;">FISB OPTIONS</h3>
    <div class="menu-item" onclick="createNewTab('https://google.com')">New Google Tab</div>
    <div class="menu-item" onclick="getCurrentWebview()?.reload()">Hard Reload</div>
    <div class="menu-item" onclick="clearBrowsingData()">Clear Cache</div>
    <div class="menu-item" onclick="toggleDevTools()">Inspect Element</div>
    <div class="menu-item" onclick="createNewTab('fisb.html')">Fish Engine Home</div>
    <div class="menu-item" onclick="alert('FISB Browser v0.4.0\nCreated by KingdomOfFinland\nStatus: 69 Contributions')">About FISB</div>
    <div style="position: absolute; bottom: 20px; font-size: 10px; color: #666;">Toshiba Legacy Edition</div>
</div>

<div id="browser-ui">
    <div id="tabs-bar">
        <div id="tabs-container" style="display: flex; gap: 5px;"></div>
        <button class="add-tab" onclick="createNewTab()">+</button>
    </div>

    <div id="nav-bar">
        <button class="nav-btn" onclick="getCurrentWebview()?.goBack()">←</button>
        <button class="nav-btn" onclick="getCurrentWebview()?.reload()">↻</button>
        <input type="text" id="url-input" placeholder="Hae tai syötä osoite..." onkeypress="handleUrl(event)">
        <div id="menu-btn" onclick="toggleMenu()">☰</div>
    </div>

    <div id="content-area"></div>
</div>

<script>
    const path = require('path');
    let tabCount = 0;
    const contentArea = document.getElementById('content-area');
    const tabsContainer = document.getElementById('tabs-container');
    const urlInput = document.getElementById('url-input');

    function toggleMenu() {
        const menu = document.getElementById('side-menu');
        const overlay = document.getElementById('overlay');
        const isOpen = menu.classList.contains('open');
        menu.classList.toggle('open');
        overlay.style.display = isOpen ? 'none' : 'block';
    }

    function createNewTab(url = "fisb.html") {
        tabCount++;
        const id = 'tab-' + tabCount;

        const tab = document.createElement('div');
        tab.className = 'tab';
        tab.id = 'btn-' + id;
        tab.innerHTML = `Välilehti ${tabCount} <span class="close-tab" onclick="closeTab('${id}', event)">×</span>`;
        tab.onclick = () => switchTab(id);
        tabsContainer.appendChild(tab);

        const wv = document.createElement('webview');
        wv.id = id;
        wv.setAttribute('useragent', "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36");
        wv.setAttribute('allowpopups', '');
        wv.setAttribute('nodeintegration', '');
        wv.setAttribute('webpreferences', 'contextIsolation=no, webSecurity=no');

        if (url === "fisb.html") {
            wv.src = `file://${path.join(__dirname, 'fisb.html')}`;
        } else {
            wv.src = url.startsWith('http') ? url : 'https://' + url;
        }

        wv.addEventListener('did-navigate', (e) => {
            if (wv.classList.contains('active')) urlInput.value = e.url.includes('fisb.html') ? '' : e.url;
        });

        contentArea.appendChild(wv);
        switchTab(id);
        if (document.getElementById('side-menu').classList.contains('open')) toggleMenu();
    }

    function switchTab(id) {
        document.querySelectorAll('webview').forEach(w => w.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        const activeWv = document.getElementById(id);
        activeWv.classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
        urlInput.value = activeWv.getURL().includes('fisb.html') ? '' : activeWv.getURL();
    }

    function clearBrowsingData() {
        const { remote } = require('electron');
        const ses = getCurrentWebview().getWebContents().session;
        ses.clearCache().then(() => alert('Cache Cleared!'));
    }

    function toggleDevTools() {
        const wv = getCurrentWebview();
        if (wv) wv.openDevTools();
    }

    function handleUrl(e) {
        if (e.key === 'Enter') {
            const activeWv = getCurrentWebview();
            let val = urlInput.value;
            activeWv.src = (val.startsWith('http://') || val.startsWith('https://')) ? val : 'https://' + val;
        }
    }

    function getCurrentWebview() { return document.querySelector('webview.active'); }
    function closeTab(id, event) {
        event.stopPropagation();
        document.getElementById(id).remove();
        document.getElementById('btn-' + id).remove();
        const tabs = document.querySelectorAll('.tab');
        if (tabs.length === 0) createNewTab();
        else switchTab(tabs[tabs.length-1].id.replace('btn-', ''));
    }

    window.onload = () => createNewTab();
</script>
</body>
</html>
