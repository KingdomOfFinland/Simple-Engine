<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Fish Browser v0.4.0 | Ultimate</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Selainpalkki */
        #browser-ui { display: flex; flex-direction: column; height: 100%; }
        #tabs-bar { display: flex; background: #111; padding: 5px 5px 0; gap: 5px; border-bottom: 2px solid #ff4444; }
        .tab { background: #222; color: #fff; padding: 8px 15px; border-radius: 5px 5px 0 0; cursor: pointer; min-width: 100px; display: flex; align-items: center; justify-content: space-between; font-size: 12px; border: 1px solid #333; }
        .tab.active { background: #ff4444; color: white; font-weight: bold; }
        .tab .close-tab { margin-left: 10px; color: #aaa; }
        .add-tab { background: #333; color: white; border: none; padding: 5px 12px; cursor: pointer; border-radius: 5px; margin-bottom: 5px; }

        #nav-bar { display: flex; background: #1a1a1a; padding: 10px; gap: 10px; align-items: center; }
        input#url-input { flex-grow: 1; background: #000; border: 1px solid #333; color: #00ff00; padding: 8px; border-radius: 20px; outline: none; }
        .nav-btn { background: none; border: none; color: white; font-size: 18px; cursor: pointer; }

        /* WebView Container */
        #content-area { flex-grow: 1; position: relative; background: #fff; }
        webview { width: 100%; height: 100%; display: none; background: white; }
        webview.active { display: flex; }
    </style>
</head>
<body>

<div id="browser-ui">
    <div id="tabs-bar">
        <div id="tabs-container" style="display: flex; gap: 5px;"></div>
        <button class="add-tab" onclick="createNewTab()">+</button>
    </div>

    <div id="nav-bar">
        <button class="nav-btn" onclick="getCurrentWebview()?.goBack()">←</button>
        <button class="nav-btn" onclick="getCurrentWebview()?.reload()">↻</button>
        <input type="text" id="url-input" placeholder="Hae tai syötä osoite..." onkeypress="handleUrl(event)">
    </div>

    <div id="content-area">
        </div>
</div>

<script>
    let tabCount = 0;
    const contentArea = document.getElementById('content-area');
    const tabsContainer = document.getElementById('tabs-container');
    const urlInput = document.getElementById('url-input');

    function createNewTab(url = "fisb.html") {
        tabCount++;
        const id = 'tab-' + tabCount;

        // Luodaan välilehti-nappi
        const tab = document.createElement('div');
        tab.className = 'tab';
        tab.id = 'btn-' + id;
        tab.innerHTML = `New Tab <span class="close-tab" onclick="closeTab('${id}', event)">×</span>`;
        tab.onclick = () => switchTab(id);
        tabsContainer.appendChild(tab);

        // Luodaan WebView (tämä on se tärkein osa!)
        const wv = document.createElement('webview');
        wv.id = id;
        
        // Fiksataan polku: jos se on fisb.html, käytetään file:// alkua
        if (url === "fisb.html") {
            const fullPath = `file://${window.process.cwd()}/fisb.html`;
            wv.src = fullPath;
        } else {
            wv.src = url.startsWith('http') ? url : 'https://' + url;
        }

        wv.setAttribute('nodeintegration', '');
        wv.setAttribute('allowpopups', '');
        
        // Päivitetään URL-palkki kun sivu vaihtuu
        wv.addEventListener('did-start-loading', () => {
            if (wv.classList.contains('active')) urlInput.value = wv.getURL();
        });

        contentArea.appendChild(wv);
        switchTab(id);
    }

    function switchTab(id) {
        document.querySelectorAll('webview').forEach(w => w.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
        
        const currentUrl = document.getElementById(id).getURL();
        urlInput.value = currentUrl.includes('fisb.html') ? '' : currentUrl;
    }

    function closeTab(id, event) {
        event.stopPropagation();
        document.getElementById(id).remove();
        document.getElementById('btn-' + id).remove();
        if (document.querySelectorAll('.tab').length === 0) {
            createNewTab();
        } else {
            const firstTab = document.querySelector('.tab');
            switchTab(firstTab.id.replace('btn-', ''));
        }
    }

    function handleUrl(e) {
        if (e.key === 'Enter') {
            let val = urlInput.value;
            const activeWv = getCurrentWebview();
            if (activeWv) {
                activeWv.src = val.startsWith('http') ? val : 'https://' + val;
            }
        }
    }

    function getCurrentWebview() {
        return document.querySelector('webview.active');
    }

    // Aloitetaan yhdellä välilehdellä
    window.onload = () => createNewTab();
</script>

</body>
</html>
    </script>
</body>
</html>
