<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; }
        #browser-ui { display: flex; flex-direction: column; height: 100%; }
        #tabs-bar { display: flex; background: #111; padding: 5px 5px 0; gap: 5px; border-bottom: 2px solid #ff4444; }
        .tab { background: #222; color: #fff; padding: 8px 15px; border-radius: 5px 5px 0 0; cursor: pointer; min-width: 150px; font-size: 12px; border: 1px solid #333; border-bottom: none; display: flex; justify-content: space-between; }
        .tab.active { background: #ff4444; font-weight: bold; }
        #nav-bar { display: flex; background: #1a1a1a; padding: 10px; gap: 10px; }
        input#url-input { flex-grow: 1; background: #000; border: 1px solid #444; color: #00ff00; padding: 8px; border-radius: 20px; outline: none; }
        #content-area { flex-grow: 1; position: relative; background: #222; }
        webview { width: 100%; height: 100%; display: none; background: white; }
        webview.active { display: flex; }
    </style>
</head>
<body>

<div id="browser-ui">
    <div id="tabs-bar">
        <div id="tabs-container" style="display: flex; gap: 5px;"></div>
        <button onclick="createNewTab()" style="cursor:pointer; background:#333; color:white; border:none; padding:5px 10px; border-radius:3px;">+</button>
    </div>
    <div id="nav-bar">
        <button onclick="getCurrentWebview()?.goBack()" style="color:white; background:none; border:none; cursor:pointer;">←</button>
        <input type="text" id="url-input" placeholder="Hae tai syötä osoite..." onkeypress="handleUrl(event)">
    </div>
    <div id="content-area"></div>
</div>

<script>
    const path = require('path');
    let tabCount = 0;
    const contentArea = document.getElementById('content-area');
    const tabsContainer = document.getElementById('tabs-container');
    const urlInput = document.getElementById('url-input');

    function createNewTab(url = "fisb.html") {
        tabCount++;
        const id = 'tab-' + tabCount;

        const tab = document.createElement('div');
        tab.className = 'tab';
        tab.id = 'btn-' + id;
        tab.innerHTML = `Välilehti ${tabCount} <span onclick="event.stopPropagation(); closeTab('${id}')">×</span>`;
        tab.onclick = () => switchTab(id);
        tabsContainer.appendChild(tab);

        const wv = document.createElement('webview');
        wv.id = id;
        
        // HUIJATAAN SIVUSTOJA (User Agent) - Tämä korjaa GitHubin!
        wv.setAttribute('useragent', "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36");
        wv.setAttribute('allowpopups', '');
        wv.setAttribute('nodeintegration', '');
        wv.setAttribute('webpreferences', 'contextIsolation=no, webSecurity=no');

        if (url === "fisb.html") {
            const target = path.join(__dirname, 'fisb.html');
            wv.src = `file://${target}`;
        } else {
            wv.src = url.startsWith('http') ? url : 'https://' + url;
        }

        wv.addEventListener('did-navigate', (e) => {
            if (wv.classList.contains('active')) urlInput.value = e.url.includes('fisb.html') ? '' : e.url;
        });

        contentArea.appendChild(wv);
        switchTab(id);
    }

    function switchTab(id) {
        document.querySelectorAll('webview').forEach(w => w.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    }

    function handleUrl(e) {
        if (e.key === 'Enter') {
            const activeWv = getCurrentWebview();
            let val = urlInput.value;
            activeWv.src = (val.startsWith('http://') || val.startsWith('https://')) ? val : 'https://' + val;
        }
    }

    function getCurrentWebview() { return document.querySelector('webview.active'); }
    function closeTab(id) { document.getElementById(id).remove(); document.getElementById('btn-' + id).remove(); if (!getCurrentWebview()) createNewTab(); }

    window.onload = () => createNewTab();
</script>
</body>
</html>
