<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish Engine | FISB v0.3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1a1a1a; --text: #f2f2f2; --box-bg: #333; --accent: #00ff00; }
        [data-theme="light"] { --bg: #f2f2f2; --text: #333; --box-bg: #fff; }
        
        body { 
            background-color: var(--bg);
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text); font-family: 'Ubuntu', sans-serif; text-align: center; margin: 0; 
            padding-top: 40px; transition: 0.3s; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- UI ELEMENTS --- */
        .logo-area img { 
            width: 150px; height: 150px; border-radius: 50%; object-fit: cover; 
            border: 4px solid var(--accent); box-shadow: 0 0 25px var(--accent); 
        }
        h1 { font-size: 2.5em; margin: 10px 0; text-shadow: 0 0 15px var(--accent); }
        
        .search-container { margin: 15px auto; width: 90%; max-width: 650px; }
        .search-box { 
            width: 100%; padding: 15px 25px; border-radius: 50px; border: 2px solid var(--accent); 
            font-size: 18px; outline: none; background: rgba(0,0,0,0.7); color: var(--text);
            box-shadow: 0 0 15px rgba(0,255,0,0.2); transition: 0.3s; box-sizing: border-box;
        }
        .search-box:focus { box-shadow: 0 0 30px var(--accent); }

        /* --- BUTTON GRIDS --- */
        .grid-label { margin-top: 20px; color: var(--accent); font-weight: bold; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .social-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 10px; max-width: 800px; }
        .s-btn { 
            padding: 8px 14px; border-radius: 6px; border: none; background: #fff; 
            cursor: pointer; font-size: 12px; font-weight: bold; color: #000; transition: 0.2s; 
        }
        .s-btn:hover { background: var(--accent); transform: scale(1.05); box-shadow: 0 0 15px var(--accent); }

        /* --- MODALS & OVERLAYS --- */
        #acc-modal, #game-overlay { 
            display: none; position: fixed; z-index: 3000; left:0; top:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.92); backdrop-filter: blur(8px); 
        }
        .modal-box { 
            background: var(--box-bg); color: var(--text); margin: 5% auto; padding: 25px; 
            width: 340px; border-radius: 20px; border: 2px solid var(--accent); box-shadow: 0 0 40px var(--accent); text-align: left;
        }
        .modal-box input { width: 92%; padding: 10px; margin: 8px 0; border-radius: 5px; border: 1px solid #555; background: #000; color: #fff; }

        /* --- ADMIN BAR --- */
        .admin-bar { 
            position: fixed; bottom: 15px; right: 15px; display: flex; gap: 10px; align-items: center;
            background: rgba(0,0,0,0.8); padding: 8px 12px; border-radius: 50px; border: 2px solid var(--accent);
        }
        .pfp-small { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--accent); cursor: pointer; object-fit: cover; }
        .mini-btn { padding: 5px 10px; font-size: 10px; border-radius: 20px; border: none; cursor: pointer; background: #222; color: #fff; font-weight: bold; }

        .footer { margin-top: auto; padding: 20px; font-size: 10px; color: #555; }
    </style>
</head>
<body>

    <div class="logo-area">
        <img id="main-pfp" src="https://i.imgur.com/pnrxkA8.png" alt="Fish Logo">
        <h1>Fish Engine</h1>
        <p style="opacity: 0.6; font-size: 12px;">v0.3.0 | Valkeakoski Engineering</p>
    </div>

    <div class="search-container">
        <input type="text" id="search" class="search-box" placeholder="Mitä etsitään?..." autofocus>
        
        <div class="grid-label">Quick Links</div>
        <div class="social-grid">
            <button class="s-btn" onclick="openS('https://youtube.com')">YouTube</button>
            <button class="s-btn" onclick="openS('https://tiktok.com')">TikTok</button>
            <button class="s-btn" onclick="openS('https://kick.com')">Kick</button>
            <button class="s-btn" onclick="openS('https://twitch.tv')">Twitch</button>
            <button class="s-btn" onclick="openS('https://instagram.com')">Instagram</button>
            <button class="s-btn" onclick="openS('https://discord.com')">Discord</button>
            <button class="s-btn" onclick="openS('https://github.com/KingdomOfFinland')">GitHub</button>
            <button class="s-btn" style="background: var(--accent);" onclick="openS('https://simplecellsoftware.com/caustic3.html')">Caustic 3</button>
        </div>

        <div class="grid-label">FISB Arcade (4 :D)</div>
        <div class="social-grid">
            <button class="s-btn" onclick="openGame('minesweeper')">💣 Miinaharava</button>
            <button class="s-btn" onclick="openGame('tictactoe')">❌ Ristinolla</button>
            <button class="s-btn" onclick="openS('https://p-m-m.github.io/Pinball/')">🎱 Pinball</button>
            <button class="s-btn" onclick="openS('https://www.google.com/logos/2010/pacman10-i.html')">🕹️ Pac-Man</button>
        </div>
    </div>

    <div id="acc-modal">
        <div class="modal-box">
            <h2 style="color:var(--accent); text-align:center; margin-top:0;">☢️ FISB CONTROL</h2>
            <label style="font-size:11px;">KÄYTTÄJÄNIMI:</label>
            <input type="text" id="u-name" placeholder="Guest">
            <label style="font-size:11px;">SALASANA / ID:</label>
            <input type="password" id="u-pass" placeholder="****">
            <label style="font-size:11px;">PFP URL:</label>
            <input type="url" id="pfp-url" placeholder="https://...">
            
            <div style="margin-top:10px; display:flex; gap:5px;">
                <button class="mini-btn" onclick="exportJSON()" style="flex:1;">Export JSON</button>
                <button class="mini-btn" onclick="importJSON()" style="flex:1;">Import JSON</button>
            </div>

            <button class="s-btn" style="width:100%; margin-top:15px; background:var(--accent); color:black;" onclick="saveProfile()">TALLENNA</button>
            <button class="s-btn" style="width:100%; margin-top:5px; background:#555; color:#fff;" onclick="closeModal('acc-modal')">SULJE</button>
        </div>
    </div>

    <div id="game-overlay">
        <div id="game-content" style="margin-top:30px; display:flex; justify-content:center;"></div>
        <button class="s-btn" style="background:#ff4444; color:white; margin-top:20px;" onclick="closeModal('game-overlay')">LOPETA PELI</button>
    </div>

    <div class="footer">
        Done Eht | <span id="user-display" style="color:var(--accent);">Guest</span> | Toshiba Power
    </div>

    <div class="admin-bar">
        <img id="nav-pfp" src="https://i.imgur.com/pnrxkA8.png" class="pfp-small" onclick="openModal('acc-modal')">
        <button class="mini-btn" onclick="changeBG()">🖼️ BG</button>
        <button class="mini-btn" id="theme-toggle">🌙</button>
    </div>

    <script>
        // --- CORE LOGIC ---
        function openS(url) { window.location.href = url; }
        
        function handleSearch(q) {
            if (!q.trim()) return;
            if (q.includes('.') && !q.includes(' ')) {
                window.location.href = q.startsWith('http') ? q : 'https://' + q;
            } else {
                window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(q);
            }
        }

        document.getElementById('search').onkeydown = (e) => { if(e.key === 'Enter') handleSearch(e.target.value); };

        // --- MODALS & GAMES ---
        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { 
            document.getElementById(id).style.display = 'none'; 
            if(id === 'game-overlay') document.getElementById('game-content').innerHTML = '';
        }

        function openGame(game) {
            openModal('game-overlay');
            const container = document.getElementById('game-content');
            if(game === 'tictactoe') container.innerHTML = `<iframe src="https://playtictactoe.org/" style="width:90%; height:450px; border:2px solid var(--accent); background:white;"></iframe>`;
            if(game === 'minesweeper') container.innerHTML = `<iframe src="https://minesweeper.online/game/1" style="width:90%; height:550px; border:2px solid var(--accent);"></iframe>`;
        }

        // --- ACCOUNT & JSON ---
        function saveProfile() {
            localStorage.setItem('f_user', document.getElementById('u-name').value);
            localStorage.setItem('f_pass', document.getElementById('u-pass').value);
            localStorage.setItem('f_pfp', document.getElementById('pfp-url').value);
            location.reload();
        }

        function exportJSON() {
            const data = JSON.stringify(localStorage);
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([data], {type: 'application/json'}));
            a.download = 'fisb_profile.json';
            a.click();
        }

        function importJSON() {
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = e => {
                const reader = new FileReader();
                reader.readAsText(e.target.files[0]);
                reader.onload = event => {
                    const obj = JSON.parse(event.target.result);
                    localStorage.clear();
                    for (let key in obj) localStorage.setItem(key, obj[key]);
                    location.reload();
                };
            };
            input.click();
        }

        function changeBG() {
            const url = prompt("Anna taustakuvan/GIF URL:");
            if(url) { localStorage.setItem('f_bg', url); document.body.style.backgroundImage = `url('${url}')`; }
        }

        // --- INITIAL LOAD ---
        window.onload = () => {
            if(localStorage.getItem('f_user')) {
                document.getElementById('user-display').innerText = localStorage.getItem('f_user');
                document.getElementById('u-name').value = localStorage.getItem('f_user');
            }
            if(localStorage.getItem('f_pass')) document.getElementById('u-pass').value = localStorage.getItem('f_pass');
            if(localStorage.getItem('f_bg')) document.body.style.backgroundImage = `url('${localStorage.getItem('f_bg')}')`;
            if(localStorage.getItem('f_pfp')) {
                document.getElementById('main-pfp').src = localStorage.getItem('f_pfp');
                document.getElementById('nav-pfp').src = localStorage.getItem('f_pfp');
                document.getElementById('pfp-url').value = localStorage.getItem('f_pfp');
            }
        };

        document.getElementById('theme-toggle').onclick = () => {
            const current = document.documentElement.getAttribute('data-theme');
            document.documentElement.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
        };
    </script>
</body>
</html>
