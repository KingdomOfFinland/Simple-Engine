<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish Engine | FISB v0.2.9</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1a1a1a; --text: #f2f2f2; --box-bg: #333; --accent: #00ff00; }
        [data-theme="light"] { --bg: #f2f2f2; --text: #333; --box-bg: #fff; }
        
        body { 
            background-color: var(--bg);
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text); font-family: 'Ubuntu', sans-serif; text-align: center; margin: 0; 
            padding-top: 60px; transition: 0.3s; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- LOGO & SEARCH --- */
        .logo-area img { 
            width: 180px; height: 180px; border-radius: 50%; object-fit: cover; 
            border: 4px solid var(--accent); 
            box-shadow: 0 0 25px var(--accent); 
        }
        h1 { font-size: 2.5em; margin: 15px 0 0; text-shadow: 0 0 10px rgba(0,255,0,0.5); }
        
        .search-container { margin: 30px auto; width: 90%; max-width: 650px; }
        .search-box { 
            width: 100%; padding: 15px 25px; border-radius: 50px; border: 2px solid var(--accent); 
            font-size: 18px; outline: none; background: rgba(0,0,0,0.6); color: var(--text);
            box-shadow: 0 0 15px rgba(0,255,0,0.3); transition: 0.3s; box-sizing: border-box;
        }
        .search-box:focus { box-shadow: 0 0 25px var(--accent); }

        /* --- GRIDS & BUTTONS --- */
        .social-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 15px; }
        .s-btn { 
            padding: 10px 18px; border-radius: 8px; border: none; background: #fff; 
            cursor: pointer; font-size: 13px; font-weight: bold; color: #000; transition: 0.2s; 
        }
        .s-btn:hover { background: var(--accent); transform: scale(1.05); box-shadow: 0 0 15px var(--accent); }

        /* --- GAME OVERLAY --- */
        #game-overlay { 
            display: none; width: 90%; max-width: 700px; margin-top: 30px; 
            padding: 20px; border: 2px solid var(--accent); background: rgba(0,0,0,0.9); 
            border-radius: 15px; box-shadow: 0 0 30px var(--accent);
        }

        /* --- ADMIN BAR --- */
        .admin-bar { 
            position: fixed; bottom: 20px; right: 20px; display: flex; gap: 10px; 
            background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 50px; 
            border: 2px solid var(--accent); z-index: 100;
        }
        .mini-btn { padding: 6px 14px; font-size: 11px; border-radius: 30px; border: none; cursor: pointer; background: #222; color: #fff; }

        .footer { margin-top: auto; padding: 40px 0 20px; font-size: 12px; color: #777; }
    </style>
</head>
<body>

    <div class="logo-area">
        <img id="main-pfp" src="https://i.imgur.com/pnrxkA8.png" alt="Fish Logo">
        <h1>Fish Engine</h1>
        <p id="subtitle">Haku koko internetistä</p>
    </div>

    <div class="search-container">
        <input type="text" id="search" class="search-box" placeholder="Etsi jotain..." autofocus>
        
        <div class="social-grid">
            <button class="s-btn" onclick="location.href='https://youtube.com'">YouTube</button>
            <button class="s-btn" onclick="location.href='https://discord.com'">Discord</button>
            <button class="s-btn" onclick="location.href='https://github.com/KingdomOfFinland'">GitHub</button>
        </div>

        <p style="margin-top: 30px; color: var(--accent); font-weight: bold;">FISB ARCADE:</p>
        <div class="social-grid">
            <button class="s-btn" onclick="openGame('minesweeper')">💣 Minesweeper</button>
            <button class="s-btn" onclick="openGame('tictactoe')">❌ Tic-Tac-Toe</button>
            <button class="s-btn" onclick="location.href='https://p-m-m.github.io/Pinball/'">🎱 Pinball</button>
        </div>

        <div id="game-overlay">
            <div id="game-content"></div>
            <button class="s-btn" onclick="closeGame()" style="background: #ff4444; margin-top: 15px;">Close Game</button>
        </div>
    </div>

    <div class="footer">
        Done Eht | Valkeakoski Engineering | <span id="user-tag" style="color:var(--accent);">Guest</span>
    </div>

    <div class="admin-bar">
        <button class="mini-btn" onclick="changeBG()">🖼️ BG</button>
        <button class="mini-btn" id="theme-btn">🌙</button>
    </div>

    <script>
        // --- SEARCH LOGIC ---
        function handleSearch(query) {
            let q = query.trim();
            if (!q) return;
            if (q.includes('.') && !q.includes(' ')) {
                if (!q.startsWith('http')) q = 'https://' + q;
                window.location.href = q;
            } else {
                window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(q);
            }
        }

        document.getElementById('search').onkeydown = (e) => {
            if (e.key === 'Enter') handleSearch(e.target.value);
        };

        // --- GAME LOGIC ---
        function openGame(game) {
            const overlay = document.getElementById('game-overlay');
            const content = document.getElementById('game-content');
            overlay.style.display = 'block';
            
            if (game === 'tictactoe') {
                content.innerHTML = `<iframe src="https://playtictactoe.org/" style="width:100%; height:400px; border:none;"></iframe>`;
            } else if (game === 'minesweeper') {
                content.innerHTML = `<iframe src="https://minesweeper.online/game/1" style="width:100%; height:500px; border:none;"></iframe>`;
            }
            overlay.scrollIntoView({ behavior: 'smooth' });
        }

        function closeGame() {
            document.getElementById('game-overlay').style.display = 'none';
            document.getElementById('game-content').innerHTML = '';
        }

        function changeBG() {
            let url = prompt("Liitä kuva/GIF URL:");
            if(url) { document.body.style.backgroundImage = `url('${url}')`; localStorage.setItem('f_bg', url); }
        }

        window.onload = () => {
            if(localStorage.getItem('f_bg')) document.body.style.backgroundImage = `url('${localStorage.getItem('f_bg')}')`;
        };
    </script>
</body>
</html>
